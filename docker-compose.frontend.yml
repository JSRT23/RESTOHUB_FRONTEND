services:
  restohub_frontend:
    build:
      context: ./restohub
      dockerfile: Dockerfile
    container_name: restohub_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./restohub:/app
      - /app/node_modules
    environment:
      # El browser accede desde el host, no desde dentro de Docker.
      # Usa localhost (o la IP LAN de tu máquina si accedes desde celular).
      - VITE_API_URL=http://localhost:8000/api/graphql/
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host
    networks:
      - restohub_network

  portal_empleados_frontend:
    image: node:20-alpine
    container_name: portal_empleados_frontend
    working_dir: /app
    ports:
      - "5174:5174"
    volumes:
      - ./portal_empleados:/app
      - /app/node_modules
    environment:
      # Misma lógica: el browser resuelve localhost, no gateway_service.
      # Si accedes desde celular en la misma red WiFi, reemplaza localhost
      # por la IP LAN de tu PC (ej: 192.168.1.X).
      - VITE_API_URL=http://localhost:8000/api/graphql/
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    networks:
      - restohub_network

  # ── App cliente (consumidores) ────────────────────────────────────────────
  # restohub_app: web pública para clientes externos.
  # Puerto 5175. Vite + React + Tailwind CSS v3.
  restohub_app_frontend:
    image: node:20-alpine
    container_name: restohub_app_frontend
    working_dir: /app
    ports:
      - "5175:5175"
    volumes:
      - ./restohub_app:/app
      - /app/node_modules
    environment:
      # El browser resuelve localhost desde el host.
      # En celular de la misma red WiFi usa la IP LAN (ej: 192.168.1.X).
      - VITE_API_URL=http://localhost:8000/api/graphql/
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host --port 5175"
    networks:
      - restohub_network

networks:
  restohub_network:
    external: true
    name: restohub_backend_restohub_network
